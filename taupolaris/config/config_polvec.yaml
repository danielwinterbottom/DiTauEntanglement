collider: LHC # options so far: are LEP and LHC

SetupNN:
  model_name: model_LHC_TransformerFlow_PolVecDirect_Weighted_onorm_angular_July11  
  reload: False # load existing model if True, otherwise train new model
  reload_scheduler: False # whether to reload the scheduler state when reloading a model
  n_epochs: 50
  hyperparams:  { # for NuFlow with transformer conditioning
              'batch_size': 4096,
              'num_layers': 9,
              'num_bins': 20,
              'tail_bound': 4.0,
              'hidden_size': 256,
              'num_blocks': 1,
              'lr': 0.0005,
              'context_dim': 64,
              'd_model': 256,
              'nhead': 2,
              'num_transformer_layers': 4,
              'dropout': 0.4}
  MLP_hyperparams: { # for MLP baseline
              'batch_size': 8192,
              'num_blocks': 6,
              'hidden_size': 512,
              'lr': 0.0005}
  use_transformer: True
  map_method: gradient
  map_num_draws: 100


Data:
  datasets: ['ppToHToTauTau_AllDM_UnCorr_Jun25_ext1', 'ppToHToTauTau_AllDM_UnCorr_Jun25_ext2', 'ppToHToTauTau_AllDM_UnCorr_Jun25_ext3', 'ppToHToTauTau_AllDM_UnCorr_Jun25_ext4','ppToHToTauTau_AllDM_UnCorr_Jun25_ext5_large','ppToHToTauTau_DM0and1_UnCorr_Jun25_large'] # save ppToHToTauTau_AllDM_UnCorr_Jun25 for testing 
  output_dir: 'prepared_LHC_data_polvectraining_alldm'  # directory where the prepared datasets will be stored
  use_reco: True # whether to use reco-level input features - this changes the cuts applied in the data processing and the visible tau vector used for the onorm basis
  test_dataset: 'prepared_LHC_data_polvectraining_alldm/ppToHToTauTau_AllDM_UnCorr_Jun25/test_dataframe__transformer.parquet'  # held-out test split saved during this model's own training data-prep (correct schema: ts_hh_*/undecayed_*/tauspinner weights)
  test_output_name: 'output_results_UnCorr'
  leptonic_mode: -1 # 0 means only hadronic taus, 1 means 1 leptonic tau and 1 hadronic, 2 means both leptonic, -1 means no selection based on whether tau is leptonic is applied
  tree_name: 'tree'  # name of the tree in the root file
  inc_reco_taus: False
  coordinates: onorm_angular  # options: standard, polar, onorm, onorm_angular (onorm_angular parameterizes the polarimetric-vector outputs as (costheta,phi) instead of the redundant unit-norm-constrained (n,r,k) triplet -- see ConvertNRKToAngular)  
  training_weight_columns: ['tauspinner_wt_alpha0', 'tauspinner_wt_alpha90']  # optional: per-event training weight = sum of these columns (e.g. train on an even CP-even + CP-odd mixture). Omit/comment out for unweighted (all events weight 1).
  train_fraction: 0.85  # fraction of the dataset to use for training
  val_fraction: 0.10 # fraction of the dataset to use for validation
  test_fraction: 0.05 # fraction of the dataset to use for testing
  full_dataframe_testing: False # if True will use full dataset for testing
